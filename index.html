<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backlog Killer | Mission Comeback</title>
    <style>
        /* Ultra-Clean Modern Aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #09090b; /* Deep matte black */
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        /* The "Impact" Flash Effect */
        body.flash {
            animation: impactFlash 0.6s ease-out;
        }

        @keyframes impactFlash {
            0% { background-color: #3b0764; }
            100% { background-color: #09090b; }
        }

        .bangle {
            margin-top: 50px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15);
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 36px;
            margin-top: 15px;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .quote-box {
            text-align: center;
            max-width: 500px;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .quote-text {
            font-size: 15px;
            color: #a1a1aa;
            line-height: 1.6;
            font-weight: 400;
            font-style: italic;
        }

        .quote-author {
            display: block;
            font-size: 12px;
            color: #a855f7;
            font-weight: 600;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .container {
            background: rgba(24, 24, 27, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            padding: 14px;
            background: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #fafafa;
            color: #09090b;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #e4e4e7;
        }

        #live-alert-panel {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, rgba(24, 24, 27, 0.8) 100%);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .alert-header {
            font-size: 15px;
            font-weight: 700;
            color: #fca5a5;
        }

        .alert-actions {
            display: flex;
            gap: 12px;
        }

        .mini-btn {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
        .btn-extend { background: #a855f7; color: white; }
        .btn-recook { background: #27272a; color: #fafafa; border: 1px solid rgba(255,255,255,0.1); }

        #plan-container {
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            position: relative;
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .status-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #18181b;
            color: #a1a1aa;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-check:hover, .day-card.status-checked .btn-check {
            background: #22c55e;
            color: white;
            border-color: #22c55e;
        }

        .btn-cross:hover, .day-card.status-crossed .btn-cross {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .day-card.status-checked {
            opacity: 0.5;
            background: rgba(34, 197, 94, 0.03);
        }
        .day-card.status-checked .backlog-text { text-decoration: line-through; color: #71717a; }

        .day-card.status-crossed {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.03);
        }
        .day-card.status-crossed .backlog-text { color: #f87171; font-style: italic; }

        .day-card.off-day { border-left: 4px solid #a855f7; }

        .day-info { display: flex; flex-direction: column; gap: 4px; }
        .day-name { font-size: 16px; font-weight: 700; }
        .date-text { font-size: 13px; color: #71717a; }
        
        .workload-info { text-align: right; display: flex; flex-direction: column; gap: 4px; }
        .backlog-text { font-size: 15px; font-weight: 700; }
        .regular-text { font-size: 13px; color: #71717a; }

        .show { opacity: 1; transform: translateY(0); }

        @keyframes thumbsUpPop {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }

        .floating-emoji {
            position: absolute;
            left: 30px;
            font-size: 24px;
            pointer-events: none;
            animation: thumbsUpPop 0.8s ease-out forwards;
        }

        /* Your Custom Aesthetic Footer */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: #52525b; /* Subtly darker gray to sit cleanly at base */
            letter-spacing: 0.3px;
            line-height: 1.5;
            font-weight: 400;
        }

        footer span {
            color: #a855f7; /* Highlighting your name beautifully */
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="bangle">🔥 Mission Comeback</div>
    <h1>Backlog Killer Plan</h1>
    
    <div class="quote-box">
        <span class="quote-text" id="motivation-quote">"Loading your daily focus code..."</span>
        <span class="quote-author" id="motivation-author"></span>
    </div>

    <div class="container">
        <div class="input-grid">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Total Backlog Classes</label>
                    <input type="number" id="backlog-total" value="15">
                </div>
                <div class="input-group">
                    <label>Duration of 1 Class</label>
                    <select id="class-duration">
                        <option value="1">1 Hour</option>
                        <option value="1.5">1.5 Hours</option>
                        <option value="2" selected>2 Hours</option>
                    </select>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Regular Classes (Daily)</label>
                    <input type="number" id="regular-classes" value="3">
                </div>
                <div class="input-group">
                    <label>Max Classes Allowed/Day</label>
                    <input type="number" id="max-classes" value="4">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Target Deadline (Days)</label>
                    <input type="number" id="days-total" value="20">
                </div>
                <div class="input-group">
                    <label>Dedicated Off-Day</label>
                    <select id="off-day">
                        <option value="Sunday">Sunday</option>
                        <option value="None">None</option>
                    </select>
                </div>
            </div>
        </div>

        <button onclick="initiateComeback()">Cook My Plan</button>
    </div>

    <div id="live-alert-panel">
        <div class="alert-header" id="alert-text">Plan Alert: You have remaining classes left over.</div>
        <div class="alert-actions">
            <button class="mini-btn btn-extend" onclick="resolveOptionA()">Do Them After Plan Ends</button>
            <button class="mini-btn btn-recook" onclick="resolveOptionB()">Re-Cook Remaining Days</button>
        </div>
    </div>

    <div id="plan-container"></div>

    <footer>
        Made by a student, <span>Chaitanya Sharma</span>, to help students in their journey to success.
    </footer>

    <script>
        const quotesRepository = [
            { text: "If you quit now, you will end up right back where you first started wishing you were here.", author: "Anonymous" },
            { text: "The backlog looks massive only until you decide to take the first step and destroy day one.", author: "Discipline Code" },
            { text: "Do not wait for motivation. True execution is doing the work precisely when you do not feel like it.", author: "Focus Hub" },
            { text: "You don't need a fresh path to restart. You just need a definitive decision to finish your day strong.", author: "Mindset" },
            { text: "Great comebacks do not require miracles. They simply demand raw, uncompromised daily consistency.", author: "Execution Core" },
            { text: "Your future profile is constructed directly by the choices you commit to right this very second.", author: "Growth Path" },
            { text: "Suffer the temporary weight of discipline today, or carry the endless weight of regret tomorrow.", author: "Legacy" },
            { text: "The absolute best way to accurately predict your destiny is to proactively create it step by step.", author: "Vision" },
            { text: "Focus is the profound ability to say a strict no to all secondary choices vying for your attention.", author: "Deep Work" },
            { text: "Small, daily execution benchmarks compound over time into massive, unbelievable transformations.", author: "Atomic Flow" },
            { text: "Your potential expands dynamically the exact moment you choose to stop negotiating with your comfort zone.", author: "Peak Performance" },
            { text: "Do not look at the entire peak. Just focus entirely on making your current step perfect.", author: "Climb Mechanics" },
            { text: "The secret to getting ahead is simply choosing to finally start moving forward.", author: "Progress System" },
            { text: "Energy flows precisely where your dedicated focus and immediate attention goes.", author: "Mind Architecture" },
            { text: "Consistency is what transforms a casual goal into an absolute, undeniable reality.", author: "Daily Grind" },
            { text: "You are entirely one single decision away from experiencing a completely different trajectory.", author: "Pivot State" },
            { text: "Do not fear slow progress. Fear standing completely still while time continues to move.", author: "Velocity Core" },
            { text: "The work you do in the complete dark is what eventually brings you into the light.", author: "Silent Grind" },
            { text: "Stop wishing it were easier. Start focusing your energy on becoming better prepared.", author: "Mind Armor" },
            { text: "He who has a clear, unyielding purpose can easily survive almost any daily obstacle.", author: "Drive Mechanics" },
            { text: "Amateurs wait for ideal conditions. True professionals simply get up and execute regardless.", author: "Mastery Flow" },
            { text: "Action kills all anxiety. Execution systematically eliminates every single doubt.", author: "Clarity Engine" },
            { text: "You cannot change your past progress, but you completely own your next performance.", author: "Reset Code" },
            { text: "The pain of studying is completely temporary. The ultimate pride of succeeding lasts forever.", author: "Victory Engine" },
            { text: "Be proud of how far you have come, and stay completely focused on where you are heading.", author: "Horizon Line" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const randomIndex = Math.floor(Math.random() * quotesRepository.length);
            const selectedQuote = quotesRepository[randomIndex];
            document.getElementById('motivation-quote').innerText = `"${selectedQuote.text}"`;
            document.getElementById('motivation-author').innerText = `— ${selectedQuote.author}`;
        });

        let globalMasterPlan = [];
        let totalBacklogsLeftUnfinished = 0;

        function initiateComeback() {
            document.body.classList.remove('flash');
            void document.body.offsetWidth; 
            document.body.classList.add('flash');

            document.getElementById('live-alert-panel').style.display = 'none';
            totalBacklogsLeftUnfinished = 0;

            buildScheduleEngine();
        }

        function buildScheduleEngine() {
            const container = document.getElementById('plan-container');
            container.innerHTML = ''; 

            let backlogs = parseInt(document.getElementById('backlog-total').value);
            let duration = parseFloat(document.getElementById('class-duration').value);
            let targetDays = parseInt(document.getElementById('days-total').value);
            let baseRegular = parseInt(document.getElementById('regular-classes').value);
            let maxDailyClasses = parseInt(document.getElementById('max-classes').value);
            let chosenOffDay = document.getElementById('off-day').value;

            let currentDate = new Date();
            let dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            
            globalMasterPlan = [];
            let currentDayCount = 0;

            while (backlogs > 0) {
                let currentDayIndex = currentDate.getDay();
                let todayName = dayNames[currentDayIndex];
                let isOffDay = (todayName === chosenOffDay);
                
                let regularToday = isOffDay ? 0 : baseRegular;
                let availableSlots = Math.max(0, maxDailyClasses - regularToday);
                let backlogsToday = isOffDay ? Math.min(availableSlots, Math.min(3, backlogs)) : Math.min(availableSlots, Math.min(2, backlogs));

                backlogs -= backlogsToday;
                currentDayCount++;

                globalMasterPlan.push({
                    dayNum: currentDayCount,
                    day: todayName,
                    date: currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                    reg: regularToday,
                    back: backlogsToday,
                    isOffDay: isOffDay,
                    status: 'pending'
                });

                currentDate.setDate(currentDate.getDate() + 1);
                if(currentDayCount > 100) break; 
            }

            renderInterfaceCards();
        }

        function renderInterfaceCards() {
            const container = document.getElementById('plan-container');
            container.innerHTML = '';

            let duration = parseFloat(document.getElementById('class-duration').value);

            globalMasterPlan.forEach((item, index) => {
                let card = document.createElement('div');
                card.className = `day-card ${item.isOffDay ? 'off-day' : ''} ${item.status === 'checked' ? 'status-checked' : ''} ${item.status === 'crossed' ? 'status-crossed' : ''}`;
                card.id = `day-card-${item.dayNum}`;

                let totalHours = item.back * duration;
                let backlogString = item.back === 0 ? "Rest / Revise" : `+${item.back} Backlogs (${totalHours} hrs)`;
                let regularString = item.reg === 0 ? "No Regular Classes" : `${item.reg} Reg. Classes`;

                card.innerHTML = `
                    <div class="card-left">
                        <div class="action-buttons">
                            <button class="status-btn btn-check" onclick="markChecked(${item.dayNum})">✓</button>
                            <button class="status-btn btn-cross" onclick="markCrossed(${item.dayNum})">✕</button>
                        </div>
                        <div class="day-info">
                            <span class="day-name">Day ${item.dayNum}: ${item.day}</span>
                            <span class="date-text">${item.date}</span>
                        </div>
                    </div>
                    <div class="workload-info">
                        <span class="backlog-text">${backlogString}</span>
                        <span class="regular-text">${regularString}</span>
                    </div>
                `;

                container.appendChild(card);
                card.classList.add('show');
            });

            evaluateAlertState();
        }

        function markChecked(dayNum) {
            let targetItem = globalMasterPlan.find(p => p.dayNum === dayNum);
            if(targetItem.status === 'checked') return;
            
            targetItem.status = 'checked';
            
            let card = document.getElementById(`day-card-${dayNum}`);
            let emoji = document.createElement('div');
            emoji.className = 'floating-emoji';
            emoji.innerText = '👍';
            card.appendChild(emoji);
            setTimeout(() => emoji.remove(), 800);

            renderInterfaceCards();
        }

        function markCrossed(dayNum) {
            let targetItem = globalMasterPlan.find(p => p.dayNum === dayNum);
            if(targetItem.status === 'crossed') return;

            targetItem.status = 'crossed';
            renderInterfaceCards();
        }

        function evaluateAlertState() {
            let missedClasses = 0;
            globalMasterPlan.forEach(item => {
                if(item.status === 'crossed') {
                    missedClasses += item.back;
                }
            });

            totalBacklogsLeftUnfinished = missedClasses;
            let alertBox = document.getElementById('live-alert-panel');
            
            if(missedClasses > 0) {
                document.getElementById('alert-text').innerText = `⚠️ Schedule Alert: You have missed targets. After Day ${globalMasterPlan.length}, you will have ${missedClasses} backlogs remaining left over.`;
                alertBox.style.display = 'flex';
            } else {
                alertBox.style.display = 'none';
            }
        }

        function resolveOptionA() {
            if(totalBacklogsLeftUnfinished <= 0) return;
            
            let currentTotalBacklogs = parseInt(document.getElementById('backlog-total').value);
            document.getElementById('backlog-total').value = currentTotalBacklogs + totalBacklogsLeftUnfinished;
            
            globalMasterPlan.forEach(p => { if(p.status === 'crossed') p.status = 'checked'; });
            
            buildScheduleEngine();
        }

        function resolveOptionB() {
            if(totalBacklogsLeftUnfinished <= 0) return;

            let remainingDaysToDistribute = globalMasterPlan.filter(p => p.status === 'pending').length;
            
            if(remainingDaysToDistribute <= 1) {
                resolveOptionA();
                return;
            }

            globalMasterPlan.forEach(p => {
                if(p.status === 'pending' && totalBacklogsLeftUnfinished > 0) {
                    p.back += 1;
                    totalBacklogsLeftUnfinished--;
                }
                if(p.status === 'crossed') {
                    p.status = 'checked'; 
                }
            });

            renderInterfaceCards();
        }
    </script>
</body>
</html>
