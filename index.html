<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backlog Killer | Mission Comeback</title>
    <style>
        /* Ultra-Clean Modern Aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #09090b; /* Deep matte black */
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        /* The "Impact" Flash Effect */
        body.flash {
            animation: impactFlash 0.6s ease-out;
        }

        @keyframes impactFlash {
            0% { background-color: #3b0764; } /* Deep purple flash */
            100% { background-color: #09090b; }
        }

        /* The "Bangle" (Badge) */
        .bangle {
            margin-top: 50px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a855f7; /* Aesthetic purple */
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15);
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 36px;
            margin-top: 15px;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        /* Clean Glass Container */
        .container {
            background: rgba(24, 24, 27, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Inputs */
        .input-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            padding: 14px;
            background: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #fafafa;
            color: #09090b;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #e4e4e7;
        }

        /* JOURNEY PROGRESS VISUAL (The Race to Success) */
        #journey-visual-container {
            width: 90%;
            max-width: 600px;
            margin-top: 40px;
            padding: 25px;
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: none; /* Initially hidden */
            flex-direction: column;
            align-items: center;
        }

        .journey-track {
            position: relative;
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        /* The Stick Person/Runner Icon */
        .runner-icon {
            position: absolute;
            left: 0%; /* Dynamic */
            top: -30px; /* Positions above track */
            width: 32px;
            height: 32px;
            background-color: transparent;
            color: #a855f7; /* Aesthetic purple */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transform: translateX(-50%); /* Centers character */
            transition: left 0.6s cubic-bezier(0.33, 1, 0.68, 1); /* Smooth movement */
        }

        /* Success/End-Line Icon */
        .success-icon {
            position: absolute;
            right: -10px;
            top: -30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
        }

        /* Status text below track */
        .progress-status {
            font-size: 14px;
            color: #a1a1aa;
            font-weight: 500;
        }

        /* Output Plan */
        #plan-container {
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            margin-bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            position: relative; /* For the 'tick' fade */
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
        }

        /* Completed State */
        .day-card.completed {
            background-color: rgba(168, 85, 247, 0.03); /* Faint aesthetic purple glow */
            border-color: rgba(168, 85, 247, 0.15);
            opacity: 0.6; /* Slight dim */
        }

        .day-card.completed .backlog-text,
        .day-card.completed .day-name {
            text-decoration: line-through;
            color: #a1a1aa;
        }

        /* Aesthetic Checkbox */
        .checkbox-container {
            margin-right: 20px;
            position: relative;
            width: 20px;
            height: 20px;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 20px;
            width: 20px;
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: #a855f7;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: #a855f7;
            border-color: #a855f7;
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        /* Off-Day Styling */
        .day-card.off-day {
            border-left: 4px solid #a855f7;
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.05) 0%, rgba(24, 24, 27, 0.8) 100%);
        }
        
        .day-card.off-day .backlog-text {
            color: #d8b4fe;
        }

        .day-info { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .day-name { font-size: 16px; font-weight: 700; color: #fafafa; transition: color 0.3s; }
        .date-text { font-size: 13px; color: #71717a; }
        
        .workload-info { text-align: right; display: flex; flex-direction: column; gap: 6px; }
        .backlog-text { font-size: 15px; color: #fafafa; font-weight: 700; transition: color 0.3s; }
        .regular-text { font-size: 13px; color: #71717a; }

        .show { opacity: 1; transform: translateY(0) scale(1); }

    </style>
</head>
<body>

    <div class="bangle">🔥 Mission Comeback</div>
    <h1>Backlog Killer Plan</h1>

    <div class="container">
        <div class="input-grid">
            <div class="input-group">
                <label>Total Backlog Classes to Cook</label>
                <input type="number" id="backlog-total" placeholder="e.g. 15">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Duration of 1 Class</label>
                    <select id="class-duration">
                        <option value="1">1 Hour</option>
                        <option value="1.5">1.5 Hours</option>
                        <option value="2" selected>2 Hours</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Deadline (Days)</label>
                    <input type="number" id="days-total" placeholder="e.g. 30">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Regular Classes (JEE/NEET)</label>
                    <input type="number" id="regular-classes" value="3">
                </div>
                <div class="input-group">
                    <label>Dedicated Off-Day</label>
                    <select id="off-day">
                        <option value="Sunday">Sunday</option>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="None">None</option>
                    </select>
                </div>
            </div>
        </div>

        <button onclick="initiateComeback()">Cook My Plan</button>
    </div>

    <div id="journey-visual-container">
        <div class="progress-status" id="journey-title">RACE TO SUCCESS (0%)</div>
        <div class="journey-track">
            <div class="runner-icon" id="runner">🏃</div>
            <div class="success-icon">🚩</div>
        </div>
        <div class="progress-status" id="journey-status">0 / 0 Backlogs Killed</div>
    </div>

    <div id="plan-container"></div>

    <script>
        // Global variables to track progress state
        let totalBacklogsToKill = 0;
        let killedBacklogs = 0;
        let planMasterList = [];

        function initiateComeback() {
            // Trigger Flash Effect
            document.body.classList.remove('flash');
            void document.body.offsetWidth; // Trigger reflow to restart animation
            document.body.classList.add('flash');

            const container = document.getElementById('plan-container');
            container.innerHTML = ''; 

            let backlogsInput = parseInt(document.getElementById('backlog-total').value);
            let duration = parseFloat(document.getElementById('class-duration').value);
            let days = parseInt(document.getElementById('days-total').value);
            let baseRegular = parseInt(document.getElementById('regular-classes').value);
            let chosenOffDay = document.getElementById('off-day').value;

            if (!backlogsInput || !days || backlogsInput <= 0 || days <= 0) {
                alert("Please enter valid numbers to cook your plan.");
                return;
            }

            // Scroll down smoothly
            setTimeout(() => {
                window.scrollBy({ top: 400, behavior: 'smooth' });
            }, 100);

            // Set up Journey Tracking data
            totalBacklogsToKill = backlogsInput;
            killedBacklogs = 0;
            planMasterList = [];
            
            updateJourneyVisuals(); // Set initial 0 state
            document.getElementById('journey-visual-container').style.display = 'flex'; // Show visual

            let currentDate = new Date();
            let dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            let tempBacklogs = backlogsInput;

            // Compute the plan list
            for (let i = 0; i < days; i++) {
                if (tempBacklogs <= 0) break; 

                let currentDayIndex = currentDate.getDay();
                let todayName = dayNames[currentDayIndex];
                let isOffDay = (todayName === chosenOffDay);
                
                let backlogsToday = 0;

                // Smart Scheduling Logic
                if (isOffDay) {
                    backlogsToday = Math.min(tempBacklogs, 3); // Up to 3 on off days
                } else {
                    backlogsToday = Math.min(tempBacklogs, 1); // 1 on regular days
                }

                tempBacklogs -= backlogsToday;

                planMasterList.push({
                    dayNum: i + 1,
                    dayName: todayName,
                    date: currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                    isOffDay: isOffDay,
                    backlogsCount: backlogsToday,
                    completed: false
                });

                currentDate.setDate(currentDate.getDate() + 1);
            }

            // Render UI with staggered animation
            renderPlanUI();
        }

        function renderPlanUI() {
            const container = document.getElementById('plan-container');
            container.innerHTML = '';
            const duration = parseFloat(document.getElementById('class-duration').value);

            planMasterList.forEach((item, index) => {
                let card = document.createElement('div');
                card.className = `day-card ${item.isOffDay ? 'off-day' : ''} ${item.completed ? 'completed' : ''}`;
                card.id = `day-card-${item.dayNum}`;

                let backlogString = item.backlogsCount === 0 ? "Rest / Revise" : `+${item.backlogsCount} Backlogs (${item.backlogsCount * duration} hrs)`;

                card.innerHTML = `
                    <label class="checkbox-container">
                        <input type="checkbox" id="check-${item.dayNum}" ${item.completed ? 'checked' : ''} onchange="toggleDayCompletion(${item.dayNum})">
                        <span class="checkmark"></span>
                    </label>
                    <div class="day-info">
                        <span class="day-name">Day ${item.dayNum}: ${item.dayName}</span>
                        <span class="date-text">${item.date}</span>
                    </div>
                    <div class="workload-info">
                        <span class="backlog-text">${backlogString}</span>
                    </div>
                `;

                container.appendChild(card);

                setTimeout(() => {
                    card.classList.add('show');
                }, index * 80); 
            });
        }

        // Handles the clicking of the checkbox
        function toggleDayCompletion(dayNum) {
            // Find the day item in our master list
            let dayItem = planMasterList.find(item => item.dayNum === dayNum);
            if(!dayItem) return;

            // Update the data state
            dayItem.completed = !dayItem.completed;

            // Visual update for the card itself
            const card = document.getElementById(`day-card-${dayNum}`);
            if(dayItem.completed) {
                card.classList.add('completed');
                killedBacklogs += dayItem.backlogsCount;
            } else {
                card.classList.remove('completed');
                killedBacklogs -= dayItem.backlogsCount;
            }

            updateJourneyVisuals();
        }

        // Re-calculates and moves the Runner icon
        function updateJourneyVisuals() {
            // Percent Calculation
            let rawPercentage = (killedBacklogs / totalBacklogsToKill) * 100;
            // Prevent division by zero and round clean
            let percentage = totalBacklogsToKill > 0 ? Math.min(100, Math.round(rawPercentage)) : 0;

            // Move the Runner icon (left CSS property)
            document.getElementById('runner').style.left = `${percentage}%`;
            
            // Update Text Displays
            document.getElementById('journey-title').innerText = `RACE TO SUCCESS (${percentage}%)`;
            document.getElementById('journey-status').innerText = `${killedBacklogs} / ${totalBacklogsToKill} Backlogs Killed`;

            // Smart status comments
            if(percentage === 100) {
                document.getElementById('journey-title').innerText = "MISSION ACCOMPLISHED (100%)";
                document.getElementById('journey-title').style.color = "#22c55e"; // Green finish
            } else if (percentage >= 75) {
                document.getElementById('journey-title').style.color = "#a855f7"; // Re-set color back to purple
            } else {
                document.getElementById('journey-title').style.color = "#fafafa"; // Normal white
            }
        }

    </script>
</body>
</html>
